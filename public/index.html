<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magister Latin - Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-indigo-800">Magister Latin</h1>
            <p class="text-gray-600">Alat bantu terjemah untuk Guru & Siswa</p>
        </header>

        <div class="bg-white shadow-xl rounded-2xl p-6">
            <div class="grid md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Pilih Bahasa Asal:</label>
                    <select id="sourceLang" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="la">Latin</option>
                        <option value="id">Indonesia</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Target:</label>
                    <div class="p-3 bg-indigo-100 text-indigo-800 rounded-lg font-bold text-center">Otomatis Terdeteksi</div>
                </div>
            </div>

            <textarea id="inputText" class="w-full h-40 p-4 border rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ketik kalimat Latin di sini..."></textarea>
            
            <button onclick="doTranslate()" id="btnTranslate" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition duration-200">
                Terjemahkan Sekarang
            </button>

            <div class="mt-8">
                <label class="block text-sm font-medium mb-2 text-gray-500">Hasil Terjemahan:</label>
                <div id="outputContainer" class="min-h-[100px] p-4 bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl italic text-gray-800 text-lg">
                    Hasil akan muncul di sini...
                </div>
            </div>
        </div>
    </div>

    <script>
        async function doTranslate() {
            const text = document.getElementById('inputText').value;
            const source = document.getElementById('sourceLang').value;
            const outputContainer = document.getElementById('outputContainer');
            const btn = document.getElementById('btnTranslate');

            if (!text.trim()) {
                alert("Mohon masukkan teks terlebih dahulu.");
                return;
            }

            // UI Loading state
            btn.disabled = true;
            btn.innerText = "Sedang Memproses...";
            outputContainer.innerText = "Menerjemahkan...";
            outputContainer.classList.add('animate-pulse');

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, source })
                });

                const data = await response.json();

                if (data.success) {
                    outputContainer.innerText = data.translation;
                } else {
                    outputContainer.innerText = "Error: " + data.message;
                    outputContainer.classList.add('text-red-500');
                }
            } catch (err) {
                outputContainer.innerText = "Gagal terhubung ke server.";
                outputContainer.classList.add('text-red-500');
            } finally {
                btn.disabled = false;
                btn.innerText = "Terjemahkan Sekarang";
                outputContainer.classList.remove('animate-pulse');
            }
        }
    </script>
</body>
</html>
