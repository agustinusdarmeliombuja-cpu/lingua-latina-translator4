<!-- Cari bagian <div id="outputContainer"> di file sebelumnya dan ganti dengan ini -->
<div id="outputContainer" class="mt-8 hidden">
    <div class="p-4 bg-indigo-50 border-l-4 border-indigo-500 rounded-r-xl">
        <label class="text-xs font-bold text-indigo-400 uppercase">Hasil Terjemahan:</label>
        <p id="resultText" class="text-2xl font-serif italic text-gray-800"></p>
        
        <div id="extraInfo" class="mt-4 pt-4 border-t border-indigo-200">
            <p class="text-sm"><strong>Tipe:</strong> <span id="resGrammar"></span></p>
            <p class="text-sm text-gray-600 mt-1"><i id="resDesc"></i></p>
            <div class="mt-2 p-2 bg-white rounded border text-sm italic text-blue-700">
                Contoh: <span id="resExample"></span>
            </div>
        </div>
    </div>
    <p id="resSource" class="text-[10px] text-right mt-2 text-gray-400 uppercase tracking-widest"></p>
</div>

<script>
    async function doTranslate() {
        const text = document.getElementById('inputText').value;
        const source = document.getElementById('sourceLang').value;
        const outputDiv = document.getElementById('outputContainer');
        
        if(!text) return alert("Isi teks!");

        const response = await fetch('/api/translate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text, source })
        });
        const data = await response.json();

        if(data.success) {
            outputDiv.classList.remove('hidden');
            document.getElementById('resultText').innerText = data.translation;
            document.getElementById('resGrammar').innerText = data.grammar;
            document.getElementById('resDesc').innerText = data.description;
            document.getElementById('resExample').innerText = data.example;
            document.getElementById('resSource').innerText = "Sumber: " + data.source;
        }
    }
</script>
