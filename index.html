<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magister Latin - Aplikasi Belajar & Terjemah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">
    <nav class="bg-indigo-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-book-musa"></i> Magister Latin</h1>
            <span class="text-sm bg-indigo-800 px-3 py-1 rounded-full text-indigo-200">Edisi Edukasi</span>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4 max-w-4xl">
        <div class="grid md:grid-cols-2 gap-6">
            <!-- Panel Input -->
            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block mb-2 font-semibold text-gray-700">Bahasa Sumber:</label>
                <select id="sourceLang" class="w-full p-2 mb-4 border rounded shadow-sm">
                    <option value="la">Latin</option>
                    <option value="id">Indonesia</option>
                </select>
                <textarea id="inputText" class="w-full h-40 p-4 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Masukkan kata atau kalimat..."></textarea>
            </div>

            <!-- Panel Output -->
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-500">
                <label class="block mb-2 font-semibold text-gray-700">Terjemahan:</label>
                <div id="loading" class="hidden text-indigo-600 animate-pulse">Menerjemahkan...</div>
                <div id="outputText" class="w-full h-40 p-4 bg-gray-50 rounded-lg text-gray-800 italic border border-dashed border-gray-300">
                    Hasil akan muncul di sini...
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <button onclick="translateText()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full transition duration-300 shadow-lg transform hover:scale-105">
                Terjemahkan Sekarang
            </button>
        </div>

        <!-- Fitur Tambahan untuk Siswa -->
        <section class="mt-12 grid md:grid-cols-3 gap-4">
            <div class="bg-blue-100 p-4 rounded-lg">
                <h3 class="font-bold text-blue-800"><i class="fas fa-graduation-cap"></i> Tatabahasa</h3>
                <p class="text-sm text-blue-700">Analisis struktur kalimat Latin secara otomatis.</p>
            </div>
            <div class="bg-green-100 p-4 rounded-lg">
                <h3 class="font-bold text-green-800"><i class="fas fa-spell-check"></i> Kosakata</h3>
                <p class="text-sm text-green-700">Kumpulan kata dasar (lemma) yang sering muncul.</p>
            </div>
            <div class="bg-purple-100 p-4 rounded-lg">
                <h3 class="font-bold text-purple-800"><i class="fas fa-chalkboard-teacher"></i> Guru</h3>
                <p class="text-sm text-purple-700">Materi latihan soal terjemahan teks klasik.</p>
            </div>
        </section>
    </main>

    <script>
        async function translateText() {
            const text = document.getElementById('inputText').value;
            const source = document.getElementById('sourceLang').value;
            const outputDiv = document.getElementById('outputText');
            const loading = document.getElementById('loading');

            if (!text) return alert("Silakan masukkan teks!");

            loading.classList.remove('hidden');
            outputDiv.innerText = "";

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, source })
                });
                const data = await response.json();
                outputDiv.innerText = data.translation;
            } catch (error) {
                outputDiv.innerText = "Terjadi kesalahan koneksi.";
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
