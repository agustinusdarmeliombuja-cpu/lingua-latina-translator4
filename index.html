<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penerjemah Latin - Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Penerjemah Latin ➜ Indonesia</h1>
        
        <div class="translator-box">
            <div class="input-area">
                <label>Bahasa Latin</label>
                <textarea id="latinInput" placeholder="Masukkan teks Latin di sini... (Contoh: Veni, vidi, vici)"></textarea>
            </div>

            <div class="action-area">
                <button id="translateBtn">Terjemahkan</button>
            </div>

            <div class="output-area">
                <label>Bahasa Indonesia</label>
                <textarea id="indoOutput" readonly placeholder="Hasil terjemahan akan muncul di sini..."></textarea>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
