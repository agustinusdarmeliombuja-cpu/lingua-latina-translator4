<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LatinEdu - Penerjemah Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-indigo-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🏛️ LatinEdu</h1>
            <span class="text-sm bg-indigo-500 px-3 py-1 rounded-full text-indigo-100">Portal Guru & Siswa</span>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 max-w-2xl">
        <div class="bg-white p-8 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-6 text-gray-700 text-center">Terjemahkan Bahasa Latin</h2>
            
            <div class="flex flex-col gap-4">
                <select id="mode" class="p-3 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="latin-to-id">Latin → Indonesia</option>
                    <option value="id-to-latin">Indonesia → Latin</option>
                </select>

                <textarea id="inputText" placeholder="Masukkan kata..." class="p-4 border rounded-lg h-32 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg"></textarea>
                
                <button onclick="translateText()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-all">
                    Terjemahkan Sekarang
                </button>
            </div>

            <!-- Hasil Terjemahan -->
            <div id="resultBox" class="mt-8 p-6 bg-indigo-50 rounded-lg hidden">
                <h3 class="text-indigo-800 font-bold text-sm uppercase mb-2">Hasil Terjemahan:</h3>
                <div id="translatedValue" class="text-2xl font-serif text-gray-800 mb-3 italic"></div>
                <hr class="border-indigo-200 my-3">
                <p class="text-sm text-gray-600"><strong>Kategori:</strong> <span id="categoryValue"></span></p>
                <p class="text-sm text-gray-600 mt-2 italic"><strong>Contoh:</strong> <span id="exampleValue"></span></p>
            </div>

            <!-- Error Message -->
            <div id="errorBox" class="mt-4 p-4 bg-red-100 text-red-700 rounded-lg hidden"></div>
        </div>
    </main>

    <script>
        async function translateText() {
            const query = document.getElementById('inputText').value;
            const mode = document.getElementById('mode').value;
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');

            if (!query) return alert("Masukkan kata terlebih dahulu");

            try {
                const response = await fetch('http://localhost:3000/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, mode })
                });

                const data = await response.json();

                if (data.success) {
                    errorBox.classList.add('hidden');
                    resultBox.classList.remove('hidden');
                    
                    document.getElementById('translatedValue').innerText = mode === 'latin-to-id' ? data.data.indonesia : data.data.latin;
                    document.getElementById('categoryValue').innerText = data.data.category;
                    document.getElementById('exampleValue').innerText = data.data.example;
                } else {
                    resultBox.classList.add('hidden');
                    errorBox.classList.remove('hidden');
                    errorBox.innerText = data.message;
                }
            } catch (err) {
                alert("Gagal terhubung ke server backend!");
            }
        }
    </script>
</body>
</html>
